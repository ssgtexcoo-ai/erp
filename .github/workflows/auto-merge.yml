name: Auto-merge bymax PRs

on:
  pull_request:
    types: [labeled]

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'bymax-automerge'
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Auto-merge PR when checks pass
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request payload');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            // Get combined status for the PR head
            const sha = pr.head.sha;
            const { data: combined } = await github.repos.getCommitStatusForRef({ owner, repo, ref: sha });

            core.info(`Combined state: ${combined.state}`);

            if (combined.state === 'success') {
              await github.pulls.merge({ owner, repo, pull_number: prNumber, merge_method: 'squash' });
              core.info(`Merged PR #${prNumber}`);
            } else {
              core.info(`Checks not green yet (state=${combined.state}), skipping merge`);
            }
