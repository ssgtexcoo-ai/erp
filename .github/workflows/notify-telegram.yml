name: Notify Telegram

on:
  workflow_run:
    workflows: ["CI", "scheduled-autofix", "Auto Merge"]
    types: [completed]
  push:
    paths:
      - 'agent-tasks.md'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build notification text
        id: build
        run: |
          set -e
          event_name=${GITHUB_EVENT_NAME}
          repo=${GITHUB_REPOSITORY}
          url="https://github.com/${repo}/actions"
          if [ "${event_name}" = "workflow_run" ]; then
            wf_name="${{ github.event.workflow_run.name }}"
            status="${{ github.event.workflow_run.conclusion }}"
            body="📣 Workflow: ${wf_name}\n• Repo: ${repo}\n• Status: ${status}\n• URL: https://github.com/${repo}/actions/runs/${{ github.event.workflow_run.id }}"
          elif [ "${event_name}" = "push" ]; then
            head="${{ github.event.head_commit.message }}"
            body="📝 agent-tasks.md updated in ${repo}\n• Commit: ${head}\n• URL: ${url}"
          else
            body="🔔 ${event_name} event in ${repo}\n• URL: ${url}"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${body}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not set; skipping notification"
            exit 0
          fi
          text="${{ steps.build.outputs.body }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="$text" >/dev/null || true
