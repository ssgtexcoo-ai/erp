<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="640" viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0f172a; }
    .card { fill: #111827; stroke: #334155; stroke-width: 2; rx: 24; }
    .title { fill: #f8fafc; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
    .text { fill: #cbd5e1; font-family: Arial, sans-serif; font-size: 18px; }
    .small { fill: #94a3b8; font-family: Arial, sans-serif; font-size: 16px; }
    .arrow { stroke: #38bdf8; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
  </style>
  <rect class="bg" x="0" y="0" width="800" height="640" />
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#38bdf8" />
    </marker>
  </defs>
  <text class="title" x="40" y="50">Как добавить секреты в GitHub</text>
  <rect class="card" x="40" y="80" width="720" height="120" />
  <text class="text" x="70" y="120">1. Открой GitHub, зайди в свой репозиторий codeERP.</text>
  <text class="text" x="70" y="150">2. Нажми Settings → Secrets and variables → Actions.</text>
  <text class="text" x="70" y="180">3. Нажми New repository secret.</text>
  <rect class="card" x="40" y="220" width="720" height="150" />
  <text class="text" x="70" y="260">4. Добавь эти секреты:</text>
  <text class="small" x="90" y="290">- NEXT_PUBLIC_SUPABASE_URL</text>
  <text class="small" x="90" y="320">- NEXT_PUBLIC_SUPABASE_ANON_KEY</text>
  <text class="small" x="90" y="350">- DEPLOY_KEY</text>
  <text class="small" x="90" y="380">- VERCEL_TOKEN</text>
  <text class="small" x="90" y="410">- (опционально) TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID</text>
  <rect class="card" x="40" y="390" width="720" height="150" />
  <text class="text" x="70" y="430">5. Зайди в GitHub Settings → Deploy keys.</text>
  <text class="text" x="70" y="460">6. Нажми Add deploy key, вставь публичный ключ и включи Allow write access.</text>
  <text class="text" x="70" y="490">7. Подключи репозиторий в Vercel и добавь те же ключи в проект.</text>
  <line class="arrow" x1="400" y1="200" x2="400" y2="220" />
  <line class="arrow" x1="400" y1="370" x2="400" y2="390" />
  <text class="small" x="40" y="560">Файл с изображением: setup-secrets-steps.svg</text>
</svg>